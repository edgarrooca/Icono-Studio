          }
          if (debugFlag === '0') {
            window.localStorage.removeItem('icono_analytics_debug_v1');

        window.__iconoGtagScriptStatus = 'loading';

          }
        };
        gtagScript.onerror = function(event) {
          window.__iconoGtagScriptStatus = 'error';
          if (window.__iconoAnalyticsDebug) {
            console.log('[Icono Analytics] gtag-script error', event);
          }
        };
        document.head.appendChild(gtagScript);

        gtag('js', new Date());
        gtag('config', measurementId, {
          send_page_view: false,
          allow_google_signals: true,
          debug_mode: debugMode ? true : undefined
        });
      })();
